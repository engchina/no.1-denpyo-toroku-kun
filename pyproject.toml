[tool.black]
line-length = 100
target-version = ["py39"]
exclude = "(reference|smartvision-erp|denpyo_toroku/ui|.venv|features)"

[tool.ruff]
line-length = 100
target-version = "py39"
extend-exclude = ["reference", "smartvision-erp", "denpyo_toroku/ui", "features", ".venv"]

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP"]
ignore = ["E501"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.mypy]
python_version = "3.9"
warn_return_any = true
warn_unused_configs = true
ignore_missing_imports = true
exclude = "(reference|smartvision-erp|denpyo_toroku/ui|features|.venv)/"

[[tool.mypy.overrides]]
module = [
  "denpyo_toroku.vendor.*",
]
ignore_errors = true

[tool.bandit]
exclude_dirs = ["reference", "smartvision-erp", "denpyo_toroku/ui", "features", ".venv"]
skips = ["B101"]
