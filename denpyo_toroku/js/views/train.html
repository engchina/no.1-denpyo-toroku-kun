<div class="oj-sm-padding-2x-horizontal">
    <div class="oj-flex oj-sm-justify-content-space-between oj-sm-align-items-center oj-sm-margin-4x-bottom">
        <h4 class="oj-flex-item">モデル学習</h4>
        <div class="oj-flex" style="gap: 8px;">
            <oj-button on-oj-action="[[reloadModel]]" chroming="outlined">
                <span slot="startIcon" class="oj-ux-ico-refresh"></span>
                モデル再読込
            </oj-button>
        </div>
    </div>

    <!-- 成功メッセージ -->
    <oj-bind-if test="[[successMessage()]]">
        <div class="msg-success oj-sm-margin-2x-bottom">
            <oj-bind-text value="[[successMessage]]"></oj-bind-text>
        </div>
    </oj-bind-if>

    <!-- エラーメッセージ -->
    <oj-bind-if test="[[errorMessage()]]">
        <div class="msg-error oj-sm-margin-2x-bottom">
            <oj-bind-text value="[[errorMessage]]"></oj-bind-text>
        </div>
    </oj-bind-if>

    <div class="oj-flex oj-sm-flex-wrap-wrap" style="gap: 16px;">
        <!-- 左: 学習データ入力 -->
        <div class="oj-panel oj-sm-padding-4x oj-flex-item" style="min-width: 400px; flex: 2;">
            <h5>学習データ</h5>
            <p class="oj-text-secondary-color" style="font-size: 13px;">
                JSONの配列形式で入力。各アイテム: {"text": "...", "label": "..."}
            </p>
            <div class="oj-sm-margin-2x-top">
                <oj-text-area style="width: 100%;"
                    label-hint="学習データ (JSON)"
                    value="{{trainingDataText}}"
                    rows="12"
                    placeholder='[{"text": "注文の配送状況を確認したい", "label": "order_tracking"}, ...]'>
                </oj-text-area>
            </div>
            <div class="oj-flex oj-sm-margin-4x-top" style="gap: 8px;">
                <oj-button on-oj-action="[[loadSampleData]]" chroming="outlined">
                    <span slot="startIcon" class="oj-ux-ico-file-text"></span>
                    サンプル読込
                </oj-button>
                <oj-button on-oj-action="[[validateData]]" chroming="outlined">
                    <span slot="startIcon" class="oj-ux-ico-check"></span>
                    データ検証
                </oj-button>
                <oj-button on-oj-action="[[clearAll]]" chroming="outlined">
                    クリア
                </oj-button>
            </div>
        </div>

        <!-- 右: パラメータ -->
        <div class="oj-panel oj-sm-padding-4x oj-flex-item" style="min-width: 300px; flex: 1;">
            <h5>学習パラメータ</h5>
            <div class="oj-sm-margin-4x-top">
                <oj-input-number class="oj-sm-margin-2x-bottom" style="max-width: 250px;"
                    label-hint="テストサイズ"
                    value="{{testSize}}"
                    min="0.05" max="0.5" step="0.05">
                </oj-input-number>
                <oj-input-number class="oj-sm-margin-2x-bottom" style="max-width: 250px;"
                    label-hint="推定器数"
                    value="{{nEstimators}}"
                    min="50" max="1000" step="50">
                </oj-input-number>
                <oj-input-number class="oj-sm-margin-2x-bottom" style="max-width: 250px;"
                    label-hint="学習率"
                    value="{{learningRate}}"
                    min="0.001" max="0.5" step="0.005">
                </oj-input-number>
                <oj-input-number class="oj-sm-margin-2x-bottom" style="max-width: 250px;"
                    label-hint="最大深度"
                    value="{{maxDepth}}"
                    min="2" max="15" step="1">
                </oj-input-number>
            </div>

            <div class="oj-sm-margin-4x-top">
                <oj-button on-oj-action="[[startTraining]]" chroming="callToAction"
                    disabled="[[isTraining()]]">
                    <span slot="startIcon" class="oj-ux-ico-education"></span>
                    学習開始
                </oj-button>
            </div>
        </div>
    </div>

    <!-- 検証中インジケータ -->
    <oj-bind-if test="[[isValidating()]]">
        <div class="oj-sm-margin-4x-top" style="text-align: center;">
            <oj-progress-circle size="md" value="-1"></oj-progress-circle>
            <p class="oj-text-secondary-color">データ品質を検証中...</p>
        </div>
    </oj-bind-if>

    <!-- 検証結果 -->
    <oj-bind-if test="[[validationResult() && !isValidating()]]">
        <div class="oj-flex oj-sm-flex-wrap-wrap oj-sm-margin-4x-top" style="gap: 16px;">
            <!-- クラス分布 -->
            <oj-bind-if test="[[classDistribution().length > 0]]">
                <div class="oj-panel oj-sm-padding-4x oj-flex-item" style="min-width: 300px; flex: 1;">
                    <h5>クラス分布
                        (<oj-bind-text value="[[validationResult().total_samples]]"></oj-bind-text> サンプル,
                        <oj-bind-text value="[[validationResult().num_classes]]"></oj-bind-text> クラス)
                    </h5>
                    <oj-table class="oj-sm-margin-2x-top"
                        aria-label="クラス分布"
                        data="[[classDistributionProvider]]"
                        columns='[{"headerText":"ラベル","field":"label","sortable":"enabled"},{"headerText":"件数","field":"count","sortable":"enabled","style":"width:80px"}]'
                        style="width: 100%; max-width: 400px;">
                    </oj-table>
                </div>
            </oj-bind-if>

            <!-- 品質上の問題 -->
            <oj-bind-if test="[[qualityIssues().length > 0]]">
                <div class="oj-panel oj-sm-padding-4x oj-flex-item" style="min-width: 300px; flex: 1;">
                    <h5 style="color: #dc3545;">品質上の問題</h5>
                    <oj-table class="oj-sm-margin-2x-top"
                        aria-label="品質上の問題"
                        data="[[qualityIssuesProvider]]"
                        columns='[{"headerText":"#","field":"index","style":"width:40px"},{"headerText":"内容","field":"description"}]'
                        style="width: 100%;">
                    </oj-table>
                </div>
            </oj-bind-if>
        </div>
    </oj-bind-if>

    <!-- 学習中 -->
    <oj-bind-if test="[[isTraining()]]">
        <div class="oj-panel oj-sm-padding-4x oj-sm-margin-4x-top" style="text-align: center;">
            <h5>学習中</h5>
            <oj-progress-circle class="oj-sm-margin-4x-top" size="lg" value="-1"></oj-progress-circle>
            <p class="oj-text-secondary-color oj-sm-margin-2x-top" style="font-size: 14px;">
                <oj-bind-text value="[[trainingProgress]]"></oj-bind-text>
            </p>
            <p class="oj-text-secondary-color" style="font-size: 12px;">
                データサイズによっては数分かかる場合があります...
            </p>
        </div>
    </oj-bind-if>

    <!-- 学習結果 -->
    <oj-bind-if test="[[trainingResults() && !isTraining()]]">
        <div class="oj-panel oj-sm-padding-4x oj-sm-margin-4x-top">
            <div class="oj-flex oj-sm-justify-content-space-between oj-sm-align-items-center">
                <h5>学習結果</h5>
                <oj-bind-if test="[[trainingResults().quality_ok]]">
                    <span class="span-green">品質OK</span>
                </oj-bind-if>
                <oj-bind-if test="[[!trainingResults().quality_ok]]">
                    <span class="span-yellow">品質問題あり</span>
                </oj-bind-if>
            </div>

            <!-- 主要メトリクス -->
            <div class="oj-flex oj-sm-flex-wrap-wrap oj-sm-margin-4x-top" style="gap: 16px;">
                <div class="oj-panel oj-bg-neutral-10 oj-sm-padding-4x" style="flex: 1; min-width: 140px; text-align: center;">
                    <div class="oj-text-secondary-color" style="font-size: 12px;">訓練精度</div>
                    <div style="font-size: 24px; font-weight: 700; color: #0572ce;">
                        <oj-bind-text value="[[(trainingResults().train_accuracy * 100).toFixed(2) + '%']]"></oj-bind-text>
                    </div>
                </div>
                <div class="oj-panel oj-bg-neutral-10 oj-sm-padding-4x" style="flex: 1; min-width: 140px; text-align: center;">
                    <div class="oj-text-secondary-color" style="font-size: 12px;">テスト精度</div>
                    <div style="font-size: 24px; font-weight: 700; color: #0572ce;">
                        <oj-bind-text value="[[(trainingResults().test_accuracy * 100).toFixed(2) + '%']]"></oj-bind-text>
                    </div>
                </div>
                <div class="oj-panel oj-bg-neutral-10 oj-sm-padding-4x" style="flex: 1; min-width: 140px; text-align: center;">
                    <div class="oj-text-secondary-color" style="font-size: 12px;">過学習ギャップ</div>
                    <div style="font-size: 24px; font-weight: 700;">
                        <oj-bind-text value="[[trainingResults().overfitting_gap.toFixed(4)]]"></oj-bind-text>
                    </div>
                </div>
                <div class="oj-panel oj-bg-neutral-10 oj-sm-padding-4x" style="flex: 1; min-width: 140px; text-align: center;">
                    <div class="oj-text-secondary-color" style="font-size: 12px;">使用推定器数</div>
                    <div style="font-size: 24px; font-weight: 700;">
                        <oj-bind-text value="[[trainingResults().n_estimators_used]]"></oj-bind-text>
                    </div>
                </div>
            </div>

            <!-- 詳細テーブル -->
            <oj-bind-if test="[[resultsDetails().length > 0]]">
                <h6 class="oj-sm-margin-4x-top">詳細</h6>
                <oj-table class="oj-sm-margin-2x-top"
                    aria-label="学習結果詳細"
                    data="[[resultsDetailsProvider]]"
                    columns='[{"headerText":"項目","field":"name"},{"headerText":"値","field":"value"}]'
                    style="width: 100%; max-width: 600px;">
                </oj-table>
            </oj-bind-if>
        </div>
    </oj-bind-if>
</div>
