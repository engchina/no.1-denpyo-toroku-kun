<div class="oj-sm-padding-2x-horizontal">
    <div class="oj-flex oj-sm-justify-content-space-between oj-sm-align-items-center oj-sm-margin-4x-bottom">
        <h4 class="oj-flex-item">統計情報</h4>
        <div class="oj-flex" style="gap: 8px;">
            <oj-button on-oj-action="[[clearCache]]" chroming="outlined">
                <span slot="startIcon" class="oj-ux-ico-delete"></span>
                キャッシュクリア
            </oj-button>
            <oj-button on-oj-action="[[refresh]]" chroming="callToAction">
                <span slot="startIcon" class="oj-ux-ico-refresh"></span>
                更新
            </oj-button>
        </div>
    </div>

    <div class="oj-text-secondary-color oj-sm-margin-2x-bottom">
        最終更新: <oj-bind-text value="[[lastUpdated]]"></oj-bind-text>
    </div>

    <div class="oj-flex oj-sm-flex-wrap-wrap" style="gap: 16px;">
        <!-- パフォーマンス -->
        <div class="oj-panel oj-sm-padding-4x oj-flex-item" style="min-width: 350px; flex: 1;">
            <h5>パフォーマンス</h5>
            <oj-table class="oj-sm-margin-2x-top"
                aria-label="パフォーマンス指標"
                data="[[performanceMetricsProvider]]"
                columns='[{"headerText":"項目","field":"name"},{"headerText":"値","field":"value","style":"text-align:right;width:150px"}]'
                style="width: 100%;">
            </oj-table>
        </div>

        <!-- キャッシュ -->
        <div class="oj-panel oj-sm-padding-4x oj-flex-item" style="min-width: 350px; flex: 1;">
            <h5>キャッシュ</h5>
            <oj-table class="oj-sm-margin-2x-top"
                aria-label="キャッシュ指標"
                data="[[cacheMetricsProvider]]"
                columns='[{"headerText":"項目","field":"name"},{"headerText":"値","field":"value","style":"text-align:right;width:150px"}]'
                style="width: 100%;">
            </oj-table>
        </div>
    </div>

    <!-- 意図分布テーブル -->
    <oj-bind-if test="[[intentDistribution().length > 0]]">
        <div class="oj-panel oj-sm-padding-4x oj-sm-margin-4x-top">
            <h5>意図分布</h5>
            <oj-table class="oj-sm-margin-2x-top"
                aria-label="意図分布"
                data="[[intentDistributionProvider]]"
                columns='[{"headerText":"意図","field":"intent","sortable":"enabled"},{"headerText":"件数","field":"count","sortable":"enabled","style":"width:100px"}]'
                style="width: 100%; max-width: 600px;">
            </oj-table>
        </div>
    </oj-bind-if>
</div>
