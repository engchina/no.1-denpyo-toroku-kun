<div class="oj-sm-padding-2x-horizontal">
    <div class="oj-flex oj-sm-justify-content-space-between oj-sm-align-items-center oj-sm-margin-4x-bottom">
        <h4 class="oj-flex-item">Model Information</h4>
        <oj-button on-oj-action="[[refresh]]" chroming="callToAction">
            <span slot="startIcon" class="oj-ux-ico-refresh"></span>
            Refresh
        </oj-button>
    </div>

    <!-- Error Message -->
    <oj-bind-if test="[[errorMessage()]]">
        <div class="oj-sm-margin-2x-bottom" style="color: #dc3545; font-weight: 600;">
            <oj-bind-text value="[[errorMessage]]"></oj-bind-text>
        </div>
    </oj-bind-if>

    <div class="oj-flex oj-sm-flex-wrap-wrap" style="gap: 16px;">
        <!-- Model Details -->
        <div class="oj-panel oj-sm-padding-4x oj-flex-item" style="min-width: 350px; flex: 1;">
            <h5>Model Details</h5>
            <oj-table class="oj-sm-margin-2x-top"
                aria-label="Model feature details"
                data="[[featureDetailsProvider]]"
                columns='[{"headerText":"Property","field":"name"},{"headerText":"Value","field":"value"}]'
                style="width: 100%;">
            </oj-table>
        </div>

        <!-- Supported Classes -->
        <div class="oj-panel oj-sm-padding-4x oj-flex-item" style="min-width: 350px; flex: 1;">
            <h5>Supported Intent Classes (<oj-bind-text value="[[numClasses]]"></oj-bind-text>)</h5>
            <oj-bind-if test="[[classList().length > 0]]">
                <oj-table class="oj-sm-margin-2x-top"
                    aria-label="Intent classes"
                    data="[[classListProvider]]"
                    columns='[{"headerText":"#","field":"index","style":"width:50px"},{"headerText":"Class Name","field":"name"}]'
                    style="width: 100%;">
                </oj-table>
            </oj-bind-if>
            <oj-bind-if test="[[classList().length === 0 && !isLoading()]]">
                <p class="oj-text-secondary-color oj-sm-margin-2x-top">No model loaded or no classes available.</p>
            </oj-bind-if>
        </div>
    </div>

    <!-- Loading indicator -->
    <oj-bind-if test="[[isLoading()]]">
        <div class="oj-sm-margin-4x-top" style="text-align: center;">
            <oj-progress-circle size="md" value="-1"></oj-progress-circle>
            <p class="oj-text-secondary-color">Loading model information...</p>
        </div>
    </oj-bind-if>
</div>
