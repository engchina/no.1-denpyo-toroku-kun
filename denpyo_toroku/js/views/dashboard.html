<div class="oj-sm-padding-2x-horizontal">
    <div class="oj-flex oj-sm-justify-content-space-between oj-sm-align-items-center oj-sm-margin-4x-bottom">
        <h4 class="oj-flex-item">ダッシュボード</h4>
        <oj-button on-oj-action="[[refresh]]" chroming="outlined">
            <span slot="startIcon" class="oj-ux-ico-refresh"></span>
            更新
        </oj-button>
    </div>

    <!-- サービス状態カード -->
    <div class="oj-flex oj-sm-flex-wrap-wrap oj-sm-margin-2x-bottom gap-4x">
        <div class="oj-panel oj-sm-padding-4x oj-flex-item" style="min-width: 280px; flex: 1;">
            <h5>サービス状態</h5>
            <div class="oj-sm-margin-2x-top">
                <div class="oj-flex oj-sm-justify-content-space-between oj-sm-margin-1x-bottom">
                    <span class="oj-text-secondary-color">ステータス:</span>
                    <span :class="[[serviceStatusClass]]">
                        <oj-bind-text value="[[serviceStatus]]"></oj-bind-text>
                    </span>
                </div>
                <div class="oj-flex oj-sm-justify-content-space-between oj-sm-margin-1x-bottom">
                    <span class="oj-text-secondary-color">メッセージ:</span>
                    <span><oj-bind-text value="[[statusMessage]]"></oj-bind-text></span>
                </div>
                <div class="oj-flex oj-sm-justify-content-space-between oj-sm-margin-1x-bottom">
                    <span class="oj-text-secondary-color">バージョン:</span>
                    <span><oj-bind-text value="[[version]]"></oj-bind-text></span>
                </div>
            </div>
        </div>

        <!-- アップロード -->
        <div class="oj-panel oj-sm-padding-4x oj-flex-item" style="min-width: 280px; flex: 1;">
            <h5>アップロード</h5>
            <div class="oj-sm-margin-2x-top">
                <div class="oj-flex oj-sm-justify-content-space-between oj-sm-margin-1x-bottom">
                    <span class="oj-text-secondary-color">総ファイル数:</span>
                    <span class="font-semibold"><oj-bind-text value="[[totalFiles]]"></oj-bind-text></span>
                </div>
                <div class="oj-flex oj-sm-justify-content-space-between oj-sm-margin-1x-bottom">
                    <span class="oj-text-secondary-color">今月の追加:</span>
                    <span><oj-bind-text value="[[thisMonthFiles]]"></oj-bind-text></span>
                </div>
            </div>
        </div>

        <!-- 登録・分類 -->
        <div class="oj-panel oj-sm-padding-4x oj-flex-item" style="min-width: 280px; flex: 1;">
            <h5>登録・分類</h5>
            <div class="oj-sm-margin-2x-top">
                <div class="oj-flex oj-sm-justify-content-space-between oj-sm-margin-1x-bottom">
                    <span class="oj-text-secondary-color">総登録件数:</span>
                    <span class="font-semibold"><oj-bind-text value="[[totalRegistrations]]"></oj-bind-text></span>
                </div>
                <div class="oj-flex oj-sm-justify-content-space-between oj-sm-margin-1x-bottom">
                    <span class="oj-text-secondary-color">今月の登録:</span>
                    <span><oj-bind-text value="[[thisMonthRegistrations]]"></oj-bind-text></span>
                </div>
                <div class="oj-flex oj-sm-justify-content-space-between oj-sm-margin-1x-bottom">
                    <span class="oj-text-secondary-color">分類総数:</span>
                    <span><oj-bind-text value="[[totalCategories]]"></oj-bind-text></span>
                </div>
                <div class="oj-flex oj-sm-justify-content-space-between oj-sm-margin-1x-bottom">
                    <span class="oj-text-secondary-color">有効分類数:</span>
                    <span><oj-bind-text value="[[activeCategories]]"></oj-bind-text></span>
                </div>
            </div>
        </div>
    </div>
</div>
