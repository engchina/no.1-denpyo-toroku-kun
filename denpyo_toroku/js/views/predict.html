<div class="oj-sm-padding-2x-horizontal">
    <h4 class="oj-sm-margin-4x-bottom">意図予測</h4>

    <!-- モード選択 -->
    <div class="oj-flex oj-sm-margin-4x-bottom" style="gap: 12px;">
        <oj-select-single class="oj-flex-item" style="max-width: 250px;"
            label-hint="モード"
            data="[[modeOptions]]"
            value="{{predictionMode}}"
            item-text="label">
        </oj-select-single>
    </div>

    <!-- 単一予測モード -->
    <oj-bind-if test="[[predictionMode() === 'single']]">
        <div class="oj-panel oj-sm-padding-4x oj-sm-margin-2x-bottom">
            <h5>単一テキスト予測</h5>
            <div class="oj-sm-margin-4x-top">
                <oj-input-text class="oj-sm-margin-2x-bottom" style="max-width: 600px;"
                    label-hint="分類するテキストを入力"
                    value="{{inputText}}"
                    placeholder="例：注文の配送状況を確認したい">
                </oj-input-text>
                <div class="oj-flex" style="gap: 8px;">
                    <oj-button on-oj-action="[[predictSingle]]" chroming="callToAction">
                        <span slot="startIcon" class="oj-ux-ico-chat"></span>
                        予測
                    </oj-button>
                    <oj-button on-oj-action="[[clearResults]]" chroming="outlined">
                        クリア
                    </oj-button>
                </div>
            </div>

            <!-- 単一結果 -->
            <oj-bind-if test="[[singleResult()]]">
                <div class="oj-sm-margin-4x-top oj-panel oj-bg-neutral-10 oj-sm-padding-4x">
                    <h5>結果</h5>
                    <div class="oj-sm-margin-2x-top">
                        <div class="oj-flex oj-sm-justify-content-space-between oj-sm-margin-1x-bottom">
                            <span class="oj-text-secondary-color">テキスト:</span>
                            <span><oj-bind-text value="[[singleResult().text]]"></oj-bind-text></span>
                        </div>
                        <div class="oj-flex oj-sm-justify-content-space-between oj-sm-margin-1x-bottom">
                            <span class="oj-text-secondary-color">意図:</span>
                            <span class="span-blue"><oj-bind-text value="[[singleResult().intent]]"></oj-bind-text></span>
                        </div>
                        <div class="oj-flex oj-sm-justify-content-space-between oj-sm-margin-1x-bottom">
                            <span class="oj-text-secondary-color">信頼度:</span>
                            <span :class="[[singleResult().confidenceClass]]">
                                <oj-bind-text value="[[singleResult().confidenceDisplay || '-']]"></oj-bind-text>
                            </span>
                        </div>
                        <div class="oj-flex oj-sm-justify-content-space-between">
                            <span class="oj-text-secondary-color">振り分け:</span>
                            <span :class="[[singleResult().confidenceClass]]">
                                <oj-bind-text value="[[singleResult().confidenceLabel || '-']]"></oj-bind-text>
                            </span>
                        </div>
                    </div>

                    <!-- 確率テーブル -->
                    <oj-bind-if test="[[probabilityData().length > 0]]">
                        <h6 class="oj-sm-margin-4x-top">全確率</h6>
                        <oj-table class="oj-sm-margin-2x-top"
                            aria-label="確率分布"
                            data="[[probabilityDataProvider]]"
                            columns='[{"headerText":"意図","field":"intent","sortable":"enabled"},{"headerText":"確率","field":"probabilityDisplay","sortable":"enabled"}]'
                            style="width: 100%; max-width: 500px;">
                        </oj-table>
                    </oj-bind-if>
                </div>
            </oj-bind-if>
        </div>
    </oj-bind-if>

    <!-- 一括予測モード -->
    <oj-bind-if test="[[predictionMode() === 'batch']]">
        <div class="oj-panel oj-sm-padding-4x oj-sm-margin-2x-bottom">
            <h5>一括テキスト予測</h5>
            <div class="oj-sm-margin-4x-top">
                <oj-text-area class="oj-sm-margin-2x-bottom" style="max-width: 600px;"
                    label-hint="テキストを入力（1行に1件）"
                    value="{{batchTexts}}"
                    rows="6"
                    placeholder="注文の配送状況を確認したい&#10;商品を返品したい&#10;クーポンコードを使いたい">
                </oj-text-area>

                <!-- 信頼度しきい値スライダー -->
                <div class="oj-sm-margin-2x-bottom" style="max-width: 400px;">
                    <oj-slider label-hint="信頼度しきい値"
                        value="{{confidenceThreshold}}"
                        min="0" max="1" step="0.05"
                        style="width: 100%;">
                    </oj-slider>
                    <span class="oj-text-secondary-color" style="font-size: 13px;">
                        しきい値: <oj-bind-text value="[[confidenceThresholdDisplay]]"></oj-bind-text>
                    </span>
                </div>

                <div class="oj-flex" style="gap: 8px;">
                    <oj-button on-oj-action="[[predictBatch]]" chroming="callToAction">
                        <span slot="startIcon" class="oj-ux-ico-chat"></span>
                        一括予測
                    </oj-button>
                    <oj-button on-oj-action="[[clearResults]]" chroming="outlined">
                        クリア
                    </oj-button>
                </div>
            </div>

            <!-- 一括サマリー -->
            <oj-bind-if test="[[batchSummary()]]">
                <div class="oj-sm-margin-4x-top oj-sm-margin-2x-bottom">
                    <span class="oj-text-secondary-color">
                        合計: <oj-bind-text value="[[batchSummary().total]]"></oj-bind-text> 件 |
                        処理時間: <oj-bind-text value="[[batchSummary().processingTime]]"></oj-bind-text>
                    </span>
                </div>
            </oj-bind-if>

            <!-- 一括結果テーブル -->
            <oj-bind-if test="[[batchResults().length > 0]]">
                <oj-table class="oj-sm-margin-2x-top"
                    aria-label="一括予測結果"
                    data="[[resultsDataProvider]]"
                    columns='[{"headerText":"#","field":"index","sortable":"enabled","style":"width:50px"},{"headerText":"テキスト","field":"text"},{"headerText":"意図","field":"intent","sortable":"enabled"},{"headerText":"信頼度","field":"confidenceDisplay","sortable":"enabled","style":"width:120px"},{"headerText":"振り分け","field":"confidenceLabel","sortable":"enabled","style":"width:120px"}]'
                    style="width: 100%;">
                </oj-table>
            </oj-bind-if>
        </div>
    </oj-bind-if>

    <!-- エラーメッセージ -->
    <oj-bind-if test="[[errorMessage()]]">
        <div class="msg-error oj-sm-margin-2x-top">
            <oj-bind-text value="[[errorMessage]]"></oj-bind-text>
        </div>
    </oj-bind-if>

    <!-- ローディング表示 -->
    <oj-bind-if test="[[isLoading()]]">
        <div class="oj-sm-margin-4x-top" style="text-align: center;">
            <oj-progress-circle size="md" value="-1"></oj-progress-circle>
            <p class="oj-text-secondary-color">処理中…</p>
        </div>
    </oj-bind-if>
</div>
