<html lang="en-us">
    <head>
        <title>Intent Classifier Service</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="viewport-fit=cover, width=device-width, initial-scale=1">
        <link rel="icon" href="css/images/favicon.ico" type="image/x-icon" />
        <!-- Oracle JET Redwood Theme (local) -->
        <link rel="stylesheet" href="vendor/jet-16.1.6/css/redwood/oj-redwood.css" id="css" />
        <!-- Oracle UX Icon Font (local) -->
        <link rel="stylesheet" id="uxiconFont" href="vendor/iconfont/ojuxIconFont.min.css">
        <!-- Application CSS -->
        <link rel="stylesheet" href="css/app.css" type="text/css"/>
        <style>
            @keyframes loading-spinner {
                to { transform: rotate(360deg); }
            }
            .loading-spinner:before {
                content: '';
                box-sizing: border-box;
                position: absolute;
                top: 40%;
                left: 50%;
                z-index: 1;
                width: 30px;
                height: 30px;
                margin-top: -10px;
                margin-left: -10px;
                border-radius: 50%;
                border: 3px solid #ccc;
                border-top-color: #333;
                animation: loading-spinner .6s linear infinite;
            }
            body { margin: 0px; }
        </style>
    </head>
    <body class="oj-web-applayout-body">
        <!-- Navigation Template -->
        <script type="text/html" id="navTemplate">
            <li><a href="#">
                <span :class="[[$data.detail.iconClass]]"></span>
                <oj-bind-text value="[[$data.detail.label]]"></oj-bind-text>
            </a></li>
        </script>

        <div id="globalBody" class="oj-offcanvas-outer-wrapper oj-offcanvas-page">
            <div id="announce" tabindex="-1" class="sendOffScreen" :aria-live="[[manner]]" aria-atomic="true">
                <p id="ariaLiveMessage">
                    <oj-bind-text value="[[message]]"></oj-bind-text>
                </p>
            </div>

            <div id="pageContent" class="oj-web-applayout-page" style="height: 100vh;">
                <!-- Header -->
                <header role="banner" class="oj-web-applayout-header" style="flex: none;">
                    <div class="oj-web-applayout-max-width oj-flex-bar oj-sm-align-items-center">
                        <div class="oj-flex-bar-start oj-sm-align-items-baseline">
                            <span role="img" class="oj-sm-only-hide oj-ux-ico-oracle" title="Logo" alt="Logo" style="color: #FF0300;"></span>
                            <span class="oj-web-applayout-header-title title oj-flex-item oj-sm-only-flex-direction-column" id="appName" title="Intent Classifier Service" style="word-break: break-word; white-space: nowrap; overflow-wrap: break-word;">
                                <oj-bind-text style="font-weight: bold; font-size: 17px; cursor: pointer;" value="Intent Classifier Service"></oj-bind-text>
                            </span>
                        </div>
                        <div class="oj-flex-bar-end">
                            <oj-toolbar id="myToolbar" aria-label="Editing Toolbar" aria-controls="controlled" class="oj-sm-padding-2x-start oj-flex-item">
                                <!-- Global time range selector (placeholder for future enhancement) -->
                                <span role="separator" aria-orientation="vertical" class="oj-toolbar-separator"></span>
                            </oj-toolbar>
                            <oj-toolbar>
                                <oj-menu-button title="Username" id="userMenu" display="[[smScreen() ? 'icons' : 'all']]" chroming="borderless">
                                    <span>
                                        <oj-bind-text value="[[user_id]]"></oj-bind-text>
                                    </span>
                                    <span slot="endIcon" :class="[[{'oj-icon demo-appheader-avatar': smScreen(), 'oj-component-icon oj-button-menu-dropdown-icon': !smScreen()}]]"></span>
                                    <oj-menu id="menu1" on-oj-action="[[menuItemAction]]" slot="menu">
                                        <oj-option id="help" value="Help">Help</oj-option>
                                        <oj-option id="out" value="logout">Sign Out</oj-option>
                                    </oj-menu>
                                </oj-menu-button>
                            </oj-toolbar>
                        </div>
                    </div>

                    <!-- Side Menu -->
                    <div style="height: 0;">
                        <oj-button class="side-menu-btn oj-bg-neutral-20" chroming="borderless" on-oj-action="[[openSideMenu]]">Menu</oj-button>
                        <oj-drawer-popup class="demo-drawer-start" opened="{{isSideMenuOpen}}">
                            <div class="oj-flex oj-sm-padding-3x-horizontal oj-sm-justify-content-space-between oj-sm-align-items-center">
                                <div><h6>Menu</h6></div>
                                <oj-button id="startButtonCloser" display="icons" chroming="borderless" on-oj-action="[[closeSideMenu]]">
                                    <span slot="startIcon" class="oj-ux-ico-close"></span>
                                    Close
                                </oj-button>
                            </div>
                            <oj-navigation-list class="oj-navigationlist-item-text-wrap"
                                display="all"
                                drill-mode="collapsible" aria-label="Choose a navigation item"
                                selection="{{sideBarSelectedItem}}"
                                current-item="{{currentItem}}"
                                on-oj-before-select="[[collapsibleSideNavigationClickHandler]]"
                                data="[[sideBarNavigationDataProvider]]" id="sideNavListCollapsible">
                                <template slot="itemTemplate" data-oj-as="item">
                                    <li :id="[[item.data.section]]" :data-title="[[item.data.title]]" :class="[[{'oj-disabled' : item.data.disabled === 'true'}]]">
                                        <a href="#">
                                            <oj-bind-if test="[[item.data.icon]]">
                                                <img :src="[[item.data.icon]]" alt="menu icon" class="oj-navigationlist-item-icon" height="24px">
                                            </oj-bind-if>
                                            <oj-bind-text value="[[item.data.title]]"></oj-bind-text>
                                        </a>
                                    </li>
                                </template>
                            </oj-navigation-list>
                        </oj-drawer-popup>
                    </div>
                </header>

                <!-- Main Content -->
                <div role="main" class="oj-web-applayout-max-width oj-web-applayout-content oj-bg-neutral-0 loading-spinner" 
                    data-bind="css: {'loading-spinner': loader()}">
                    <div style="flex: auto;">
                        <div class="demo-switcher-container main_container" id="intentServiceBodyContainer">
                            <!-- Tab Bar -->
                            <div class="oj-flex oj-sm-flex-wrap-nowrap oj-sm-justify-content-space-between">
                                <oj-conveyor-belt class="oj-sm-12 oj-flex-item">
                                    <oj-tab-bar id="topTabBar" selection="{{selectedMenuItem}}" class="oj-sm-condense tab-menu"
                                        current-item="{{currentSelectedMenuItem}}" edge="top" data="[[topTabDataProvider]]">
                                        <template slot="itemTemplate" data-oj-as="item">
                                            <li class="oj-sm-padding-3x-horizontal">
                                                <a href="#">
                                                    <oj-bind-if test="[[item.data.id === 'dashboard']]">
                                                        <span class="oj-ux-ico-home oj-sm-margin-1x-end"></span>
                                                    </oj-bind-if>
                                                    <span>
                                                        <oj-bind-if test="[[item.data.icon]]">
                                                            <span :class=[[item.data.icon]]></span>
                                                        </oj-bind-if>
                                                        <oj-bind-text value="[[item.data.name]]"></oj-bind-text>
                                                    </span>
                                                </a>
                                            </li>
                                        </template>
                                    </oj-tab-bar>
                                </oj-conveyor-belt>
                            </div>

                            <!-- Switcher Content -->
                            <oj-switcher value="[[selectedMenuItem]]">
                                <div slot="dashboard" id="dashboard" role="tabpanel" aria-labelledby="dashboard-tab">
                                    <oj-defer slot="defer">
                                        <div class="oj-sm-margin-2x oj-sm-padding-2x-horizontal"></div>
                                        <oj-module config='[[dashboardModuleConfig]]'></oj-module>
                                    </oj-defer>
                                </div>
                                <div slot="predict" id="predict" role="tabpanel" aria-labelledby="predict-tab">
                                    <oj-defer slot="defer">
                                        <div class="oj-sm-margin-2x oj-sm-padding-2x-horizontal"></div>
                                        <oj-module config='[[predictModuleConfig]]'></oj-module>
                                    </oj-defer>
                                </div>
                                <div slot="train" id="train" role="tabpanel" aria-labelledby="train-tab">
                                    <oj-defer slot="defer">
                                        <div class="oj-sm-margin-2x oj-sm-padding-2x-horizontal"></div>
                                        <oj-module config='[[trainModuleConfig]]'></oj-module>
                                    </oj-defer>
                                </div>
                                <div slot="stats" id="stats" role="tabpanel" aria-labelledby="stats-tab">
                                    <oj-defer slot="defer">
                                        <div class="oj-sm-margin-2x oj-sm-padding-2x-horizontal"></div>
                                        <oj-module config='[[statsModuleConfig]]'></oj-module>
                                    </oj-defer>
                                </div>
                                <div slot="modelInfo" id="modelInfo" role="tabpanel" aria-labelledby="modelInfo-tab">
                                    <oj-defer slot="defer">
                                        <div class="oj-sm-margin-2x oj-sm-padding-2x-horizontal"></div>
                                        <oj-module config='[[modelInfoModuleConfig]]'></oj-module>
                                    </oj-defer>
                                </div>
                            </oj-switcher>
                            <!-- Scroll to Top Button -->
                            <oj-button id="scrollToTopBtn" aria-label="Scroll to top" title="Scroll to top"
                                class="btn-scroll-top oj-bg-neutral-0" on-oj-action="[[scrollToTop]]">
                                <span slot="startIcon" class="oj-ux-ico-arrow-alt-up"></span>
                            </oj-button>
                        </div>

                        <!-- Common Drawer/Modal Popup -->
                        <div>
                            <oj-drawer-popup opened="{{showDrawer}}" edge="end" 
                                id="commonDrawer" class="oj-sm-padding-2x-horizontal"
                                style="max-width: 90vw !important; width: 95vw; min-height: 100vh; height: auto;" close-gesture="none">
                                <div class="oj-header-border oj-sm-padding-2x oj-sm-margin-3x-bottom"
                                    style="position: sticky; z-index: 1; left: 0; top: 0; background-color: var(--oj-panel-bg-color);">
                                    <div class="oj-sm-12 oj-flex-item oj-sm-padding-2x-horizontal oj-sm-padding-2x oj-flex oj-sm-align-items-center oj-sm-justify-content-space-between oj-sm-margin-3x-bottom">
                                        <span>
                                            <span style="font-weight: bold; line-height: normal;" class="oj-typography-subheading-md">
                                                <oj-bind-text value="[[drawerTitle]]"></oj-bind-text>
                                            </span>
                                        </span>
                                        <span class="oj-typography-body-sm oj-text-color-secondary">
                                            <oj-button aria-label="Close drawer" on-oj-action="[[closeDrawer]]" display="icons">
                                                <span slot="startIcon" class="oj-ux-ico-close"></span>
                                            </oj-button>
                                        </span>
                                    </div>
                                    <div id="drawerContent" class="oj-sm-padding-2x">
                                        <!-- Dynamic drawer content will be inserted here -->
                                    </div>
                                </div>
                            </oj-drawer-popup>
                        </div>
                    </div>
                </div>

                <!-- Footer -->
                <footer class="oj-web-applayout-footer" role="contentinfo" style="flex: none;">
                    <div class="oj-web-applayout-footer-item oj-web-applayout-max-width">
                        <ul>
                            <oj-bind-for-each data="[[footerLinks]]">
                                <template>
                                    <li>
                                        <a :id="[[$current.data.linkId]]" :href="[[$current.data.linkTarget]]">
                                            <oj-bind-text value="[[$current.data.name]]"></oj-bind-text>
                                        </a>
                                    </li>
                                </template>
                            </oj-bind-for-each>
                        </ul>
                    </div>
                    <div class="oj-web-applayout-footer-item oj-web-applayout-max-width oj-text-secondary-color oj-text-sm">
                        Copyright © 2024, 2026 Oracle and/or its affiliates. All rights reserved.
                    </div>
                </footer>
            </div>
        </div>

        <!-- Oracle JET Scripts (local) -->
        <script type="text/javascript" src="vendor/jet-16.1.6/js/require.js"></script>
        <script type="text/javascript" src="vendor/jet-16.1.6/js/bundles-config.js"></script>
        <script type="text/javascript" src="js/main.js"></script>
    </body>
</html>
