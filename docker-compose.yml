version: '3.8'

services:
  # Denpyo Toroku Service
  denpyo-toroku:
    build: .
    container_name: denpyo-toroku-service
    ports:
      - "8080:8080"
    volumes:
      # OCI configuration
      - ~/.oci:/home/appuser/.oci:ro
      # Log directory
      - ./denpyo_toroku/log:/home/appuser/install/denpyo_toroku/log
    environment:
      - OCI_CONFIG_PATH=/home/appuser/.oci/config
      - OCI_CONFIG_PROFILE=DEFAULT
      - LOG_LEVEL=INFO
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/api/v1/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - denpyo-toroku-network

  prometheus:
    image: prom/prometheus:latest
    container_name: denpyo-toroku-prometheus
    profiles: ["observability"]
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    depends_on:
      - denpyo-toroku
    restart: unless-stopped
    networks:
      - denpyo-toroku-network

  grafana:
    image: grafana/grafana:latest
    container_name: denpyo-toroku-grafana
    profiles: ["observability"]
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - denpyo-toroku-network

  # Nginx reverse proxy (optional)
  nginx:
    image: nginx:alpine
    container_name: denpyo-toroku-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - denpyo-toroku
    restart: unless-stopped
    networks:
      - denpyo-toroku-network

networks:
  denpyo-toroku-network:
    driver: bridge

volumes:
  prometheus-data:
  grafana-data:
